name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release
        with:
          token: ${{ secrets.GH_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-upload:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - name: Build binaries
        run: make dist
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} dist/*

  package-macos:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - name: Import code-signing cert
        # SHA verified via: gh api repos/Apple-Actions/import-codesign-certs/git/refs/tags/v3
        # Both v3 and v3.0.0 resolve to 63fff01cd422d4b7b855d40ca1e9d34d2de9427d (verified 2026-04-28)
        id: import-cert
        uses: apple-actions/import-codesign-certs@63fff01cd422d4b7b855d40ca1e9d34d2de9427d # v3
        with:
          p12-file-base64: ${{ secrets.APPLE_INTERNAL_SIGNING_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_INTERNAL_SIGNING_P12_PASSWORD }}
      - name: Configure keychain for productsign
        # The action runs set-key-partition-list with apple-tool:,apple: internally,
        # but productsign also needs codesign: on headless runners. We run a second
        # pass using the keychain password from the action output.
        run: |
          KC="$HOME/Library/Keychains/signing_temp.keychain"
          KC_PASS="${{ steps.import-cert.outputs.keychain-password }}"
          security unlock-keychain -p "$KC_PASS" "$KC"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PASS" "$KC"
          security list-keychains -d user -s "$KC" login.keychain-db
      - name: Verify signing identity is available
        run: |
          echo "Keychain search list:"
          security list-keychains -d user
          echo "All identities (including invalid):"
          security find-identity -p codesigning
          echo "Valid codesigning identities:"
          security find-identity -v -p codesigning
      - name: Write signing-cert PEM for trust profile
        env:
          CERT_PEM: ${{ secrets.APPLE_INTERNAL_SIGNING_CERT_PEM }}
        run: |
          mkdir -p dist
          printf '%s\n' "$CERT_PEM" > dist/signing-cert.pem
      - name: Trust self-signed cert as installer signing root
        # productsign evaluates the cert chain against the installer policy.
        # Self-signed certs are not trusted by default, so the chain check
        # fails even with the right OIDs. Adding the cert as a trusted root
        # in the system keychain makes the chain evaluation pass for this runner.
        run: |
          sudo security add-trusted-cert -d -r trustRoot \
            -k /Library/Keychains/System.keychain dist/signing-cert.pem
      - name: Build signed .pkg
        env:
          APPLE_INTERNAL_SIGNING_IDENTITY: ${{ secrets.APPLE_INTERNAL_SIGNING_IDENTITY }}
        run: make pkg
      - name: Verify hardened runtime
        run: codesign -dv --verbose=4 build/databricks-claude 2>&1 | grep -E 'flags=.*runtime'
      - name: Build trust profile
        run: make trust-profile
      - name: Validate trust profile plist
        run: plutil -lint dist/databricks-claude-trust.mobileconfig
      - name: Assert canonical helper path is embedded
        run: |
          # MUST match desktop_config.MacOSCanonicalHelperPath
          # (locked by TestMacOSCanonicalHelperPathLiteral).
          EXPECTED="/usr/local/bin/databricks-claude-credential-helper"
          pkgutil --payload-files dist/databricks-claude.pkg | grep -F "$EXPECTED"
      - name: Assert pkg signature
        env:
          APPLE_INTERNAL_SIGNING_IDENTITY: ${{ secrets.APPLE_INTERNAL_SIGNING_IDENTITY }}
        run: |
          # Self-signed certs report 'signed by untrusted identifier' on
          # runners without the trust profile installed; that's expected.
          OUT=$(pkgutil --check-signature dist/databricks-claude.pkg)
          echo "$OUT"
          echo "$OUT" | grep -E "Status: (signed|signed by untrusted identifier)"
          echo "$OUT" | grep -F "$APPLE_INTERNAL_SIGNING_IDENTITY"
      - name: Upload pkg + trust profile to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            dist/databricks-claude.pkg \
            dist/databricks-claude-trust.mobileconfig

  update-homebrew:
    needs: [release-please, build-and-upload]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch formula update to homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh api repos/IceRhymers/homebrew-tap/dispatches \
            -f event_type=formula-update \
            -f "client_payload[tool]=databricks-claude" \
            -f "client_payload[tag]=${{ needs.release-please.outputs.tag_name }}" \
            -f "client_payload[version]=${{ needs.release-please.outputs.tag_name }}"
  update-scoop:
    needs: [release-please, build-and-upload]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch manifest update to scoop-bucket
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${VERSION#v}"
          gh api repos/IceRhymers/scoop-bucket/dispatches \
            -f event_type=update-databricks-claude \
            -f "client_payload[binary]=databricks-claude" \
            -f "client_payload[version]=${VERSION}"
